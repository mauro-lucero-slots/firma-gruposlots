<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Generar firma</title>
</head>

<body>

    <h2>Formulario de Firma</h2>

    <form method="get" action="firma-test.html">

        <label>
            Nombre:
            <input type="text" name="nombre" required>
        </label>
        <br><br>

        <label>
            Puesto:
            <input type="text" name="puesto">
        </label>
        <br><br>

        <label>
            Departamento:
            <input type="text" name="deptTrabajo">
        </label>
        <br><br>

        <label>
            Dirección:
            <input type="text" name="direccionDeTrabajo">
        </label>
        <br><br>

        <label>
            Código Postal:
            <input type="text" name="codigoPostal">
        </label>
        <br><br>

        <label>
            Localidad:
            <input type="text" name="localidad">
        </label>
        <br><br>

        <label>
            Provincia:
            <input type="text" name="provincia">
        </label>
        <br><br>

        <label>
            Email:
            <input type="email" name="email">
        </label>
        <br><br>

        <label>
            Teléfono:
            <input type="text" name="telefono">
        </label>
        <br><br>

        <label>
            Sitio Web:
            <input type="url" name="sitioWeb">
        </label>
        <br><br>

        <div>
            <label>
                <input type="radio" name="imagenFirma" value="1" checked>
                <img src="img/firma(1).jpg" alt="Grupo Slots" width="105" height="89">
            </label>
            <label>
                <input type="radio" name="imagenFirma" value="2">
                <img src="img/firma(2).jpg" alt="Grupo Slots" width="105" height="89">
            </label>
            <label>
                <input type="radio" name="imagenFirma" value="3">
                <img src="img/firma(3).jpg" alt="Grupo Slots" width="105" height="89">
            </label>
            <label>
                <input type="radio" name="imagenFirma" value="4">
                <img src="img/firma(4).jpg" alt="Grupo Slots" width="105" height="89">
            </label>
            <label>
                <input type="radio" name="imagenFirma" value="5">
                <img src="img/firma(5).jpg" alt="Grupo Slots" width="105" height="89">
            </label>
        </div>

        <button type="submit">Generar firma</button>

    </form>

</body>

</html>
