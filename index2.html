<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <title>Generador de Firma - Grupo Slots</title>
</head>
</head>

<body class="container py-3">

    <form class="row row-gap-2 justify-content-center">
        <div class="col-12 text-center py-3">
            <h1 class="display-4">Generador de Firma - Grupo Slots</h1>
        </div>
        <div class="col-md-8">
            <div class="p-3 bg-white rounded border">
                <div class="row">
                    <div class="col-12 col-md-6">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Nombre" aria-label="Nombre">
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Apellido" aria-label="Apellido">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="mb-3">
                            <div class="input-group mb-3">
                                <input type="text" class="form-control" placeholder="nombre.apellido"
                                    aria-label="nombre.apellido">
                                <span class="input-group-text">@</span>
                                <select id="inputState" class="form-select">
                                    <option>gruposlots.com.ar</option>
                                    <option>jugadon.bet.ar</option>
                                    <option>loteria.com</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Puesto" aria-label="Puesto">
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Dirección" aria-label="Dirección">
                        </div>
                    </div>
                    <div class="col-12">
                        
                    </div>
                    <div class="col-12 col-md-6"></div>
                    <div class="col-12 col-md-6"></div>
                    <div class="col-12 col-md-6"></div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Crear</button>
                    </div>
                </div>
            </div>
        </div>
    </form>

</body>

</html>
